name: french_towns_lakehouse
prefect-version: 3.6.17

build: null
push: null

pull:
- prefect.deployments.steps.set_working_directory:
    directory: "{{ $FRENCH_TOWNS_ROOT }}"

deployments:
- name: staging-historical-population
  entrypoint: flows_staging/staging/staging_historical_population.py:staging_historical_population
  schedules: []
  work_pool:
    name: local-dev-pool

- name: staging-salaries
  entrypoint: flows_staging/staging/staging_salaries.py:staging_salaries
  schedules: []
  work_pool:
    name: local-dev-pool

- name: staging-french-communes
