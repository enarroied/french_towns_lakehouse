paths:
  temp_dir: "/tmp/french_towns_downloads"
  input_dir: "input"
  output_dir: "data/processed"
  scraper_dir: "data/scraper"

directories:
  - temp_dir
  - input_dir
  - scraper_dir

download:
  concurrency: 3
  timeout_seconds: 120

downloads:
  - name: "populations_historiques"
    url: "https://api.insee.fr/melodi/file/DS_POPULATIONS_HISTORIQUES/DS_POPULATIONS_HISTORIQUES_CSV_FR"
    filename: "populations_historiques.zip"

  - name: "french_communes"
    url: "https://www.data.gouv.fr/api/1/datasets/r/127cbafe-c944-4502-a31a-9cbf64fcc08b"
    filename: "communes_france.geojson"

  - name: "arrondissements"
    url: "https://www.insee.fr/fr/statistiques/fichier/6051727/arrondissement_2022.csv"
    filename: "arrondissements.csv"

  - name: "departements"
    url: "https://www.insee.fr/fr/statistiques/fichier/6051727/departement_2022.csv"
    filename: "departements.csv"

  - name: "salaries"
    url: "https://api.insee.fr/melodi/file/DS_BTS_SAL_EQTP_SEX_PCS/DS_BTS_SAL_EQTP_SEX_PCS_2023_CSV_FR"
    filename: "salaries.csv"

scrapers:
  - name: "petites_cites"
    module: "scrapers.scrape_petites_cites"
    enabled: true
    sitemap_url: "https://www.petitescitesdecaractere.com/cites-sitemap.xml"
    user_agent: "FrenchTownsBot/1.0 (contact: eric.narro.ied@gmail.com)"
    concurrency: 5

  - name: "villes_fleuries"
    module: "scrapers.scrape_villes_fleuries"
    enabled: true
    endpoint: "https://villes-et-villages-fleuris.com/pages/post/commune"
    referer: "https://villes-et-villages-fleuris.com/les-communes-labelisees"
    user_agent: "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/146.0.0.0 Safari/537.36"
    page_size: 1000
    crawl_delay: 1
