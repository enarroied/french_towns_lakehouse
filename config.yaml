paths:
  temp_dir: "/tmp/french_towns_downloads"
  input_dir: "input"
  output_dir: "data/processed"
  sql_dir: "sql"

directories:
  - temp_dir
  - input_dir
  - output_dir
  - sql_dir

download:
  concurrency: 3
  timeout_seconds: 120

downloads:
  - name: "populations_historiques"
    url: "https://api.insee.fr/melodi/file/DS_POPULATIONS_HISTORIQUES/DS_POPULATIONS_HISTORIQUES_CSV_FR"
    filename: "populations_historiques.zip"

  - name: "french_communes"
    url: "https://www.data.gouv.fr/api/1/datasets/r/127cbafe-c944-4502-a31a-9cbf64fcc08b"
    filename: "communes_france.geojson"

  - name: "arrondissements"
    url: "https://www.insee.fr/fr/statistiques/fichier/6051727/arrondissement_2022.csv"
    filename: "arrondissements.csv"

  - name: "departements"
    url: "https://www.insee.fr/fr/statistiques/fichier/6051727/departement_2022.csv"
    filename: "departements.csv"

  - name: "salaries"
    url: "https://api.insee.fr/melodi/file/DS_BTS_SAL_EQTP_SEX_PCS/DS_BTS_SAL_EQTP_SEX_PCS_2023_CSV_FR"
    filename: "salaries.csv"

transformations:
  - name: "process_communes"
    input_pattern: "communes_france.geojson"
    sql_template: "transform_french_towns.sql"
    output_file: "dim_communes_france.parquet"
    params:
      arrondissements_file: "arrondissements.csv"
      departements_file: "departements.csv"

  - name: "process_population"
    input_pattern: "DS_POPULATIONS_HISTORIQUES_data.csv"
    sql_template: "transform_population.sql"
    output_file: "fact_population.parquet"

  - name: "process_salaries"
    input_pattern: "DS_BTS_SAL_EQTP_SEX_PCS_2023_data.csv"
    sql_template: "transform_salaries.sql"
    output_file: "fact_salaries.parquet"
