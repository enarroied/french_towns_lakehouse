paths:
  temp_dir: "/tmp/french_towns_downloads"
  output_dir: "data/processed"
  scraper_dir: "data/scraper"
  custom_dir: "data/custom"

directories:
  - temp_dir
  - scraper_dir
  - custom_dir

buckets:
  staging_current: "staging-current"
  staging_historical: "staging-historical"
  validated: "validated"
  validated_historical: "validated-historical"
  rejected: "rejected"
  evidence_archive: "evidence-archive"
  lakehouse: "lakehouse"

download:
  concurrency: 3
  timeout_seconds: 120

downloads:
  - name: "historical_population"
    source_id: 1
    source_label: "Populations historiques"
    organization: INSEE
    reference_url: "https://catalogue-donnees.insee.fr/fr/catalogue/recherche/DS_POPULATIONS_HISTORIQUES"
    license: "INSEE RP license"
    description: "Historical population data from French census (Recensement de la population)"
    url: "https://api.insee.fr/melodi/file/DS_POPULATIONS_HISTORIQUES/DS_POPULATIONS_HISTORIQUES_CSV_FR"
    source_file_patterns:
      - "DS_POPULATIONS_HISTORIQUES_data.csv"
    file_targets:
      - historical_population
    extensions:
      - .csv
    domain: "demographics"
    target_folder: "demographics"

  - name: "salaries"
    source_id: 6
    source_label: "Base Recensement Tous Salaires"
    organization: INSEE
    reference_url: "https://www.insee.fr/fr/information/2407785"
    license: "INSEE salary license"
    description: "Mean salary by sex and socio-professional category"
    url: "https://api.insee.fr/melodi/file/DS_BTS_SAL_EQTP_SEX_PCS/DS_BTS_SAL_EQTP_SEX_PCS_2023_CSV_FR"
    filename: "salaries"
    source_file_patterns:
      - DS_BTS_SAL_EQTP_SEX_PCS_2023_data.csv
    file_targets:
      - historical_salaries
    extensions:
      - .csv
    domain: "demographics"
    target_folder: "demographics"

  - name: "births"
    source_id: 4
    source_label: "Naissances — État Civil"
    organization: INSEE
    reference_url: "https://www.insee.fr/fr/statistiques/1893255"
    license: "INSEE EC license"
    description: "Births data from civil registry (2008-2024)"
    url: "https://www.insee.fr/fr/statistiques/fichier/1893255/base_naissances_2008-2024_geo2025_csv.zip"
    source_file_patterns:
      - "DS_ETAT_CIVIL_NAIS_COMMUNES_data.csv"
    file_targets:
      - births
    extensions:
      - .csv
    domain: "demographics"
    target_folder: "demographics"

  - name: "deaths"
    source_id: 5
    source_label: "Décès — État Civil"
    organization: INSEE
    reference_url: "https://www.insee.fr/fr/statistiques/1893253"
    license: "INSEE EC license"
    description: "Deaths data from civil registry"
    url: "https://api.insee.fr/melodi/file/DS_ETAT_CIVIL_DECES_COMMUNES/DS_ETAT_CIVIL_DECES_COMMUNES_CSV_FR"
    source_file_patterns:
      - "DS_ETAT_CIVIL_DECES_COMMUNES_data.csv"
    file_targets:
      - deaths
    extensions:
      - .csv
    domain: "demographics"
    target_folder: "demographics"

  - name: "family"
    source_id: 2
    source_label: "Famille — Recensement de la population"
    organization: INSEE
    reference_url: "https://catalogue-donnees.insee.fr/fr/catalogue/recherche/DS_RP_FAMILLE_COMP"
    license: "INSEE RP license"
    description: "Family composition data from census"
    url: "https://api.insee.fr/melodi/file/DS_RP_FAMILLE_COMP/DS_RP_FAMILLE_COMP_2022_CSV_FR"
    source_file_patterns:
      - "DS_RP_FAMILLE_COMP_2022_data.csv"
    file_targets:
      - family
    extensions:
      - .csv
    domain: "demographics"
    target_folder: "demographics"

  - name: "migration"
    source_id: 3
    source_label: "Immigration — Recensement de la population"
    organization: INSEE
    reference_url: "https://www.insee.fr/fr/statistiques/8582054"
    license: "INSEE RP license"
    description: "Migration/immigration data, 2022 dataset"
    url: "https://www.insee.fr/fr/statistiques/fichier/8582054/TD_IMG1A_2022_csv.zip"
    source_file_patterns:
      - "TD_IMG1A_2022.csv"
    file_targets:
      - migration
    extensions:
      - .csv
    domain: "demographics"
    target_folder: "demographics"

  - name: "french_communes"
    source_id: 8
    source_label: "Contours administratifs — Communes (GéoJSON)"
    organization: data.gouv.fr / IGN
    reference_url: "https://www.data.gouv.fr/datasets/contours-administratifs"
    license: "Open Database License (ODbL)"
    description: "Geographic boundaries of all French communes including COM territories (Polynésie, Nouvelle-Calédonie, etc.) from data.gouv.fr contours administratifs"
    url: "https://www.data.gouv.fr/api/1/datasets/r/7daa12dc-6fa4-44f6-9ccc-7bf2f6e2a594"
    filename: "communes_france"
    source_file_patterns:
      - "communes_france"
    file_targets:
      - french_towns
    extensions:
      - .geojson
    domain: "geography"
    target_folder: "geography"

  - name: "cog_ensemble"
    source_id: 20
    source_label: "Code Officiel Géographique — ensemble 2026"
    organization: INSEE COG
    reference_url: "https://www.insee.fr/fr/information/8740222"
    license: "INSEE COG license"
    description: "Complete COG administrative geography (communes, arrondissements, départements, régions) including COM territories"
    url: "https://www.insee.fr/fr/statistiques/fichier/8740222/cog_ensemble_2026_csv.zip"
    filename: "cog_ensemble"
    source_file_patterns:
      - "v_commune_2026\\.csv"
      - "v_commune_comer_2026\\.csv"
      - "v_departement_2026\\.csv"
      - "v_arrondissement_2026\\.csv"
      - "v_region_2026\\.csv"
    file_targets:
      - "v_commune_2026"
      - "v_commune_comer_2026"
      - "v_departement_2026"
      - "v_arrondissement_2026"
      - "v_region_2026"
    extensions:
      - ".csv"
      - ".csv"
      - ".csv"
      - ".csv"
      - ".csv"
    domain: "geography"
    target_folder: "geography"

  - name: "zip_codes"
    source_id: 11
    source_label: "Base officielle des codes postaux"
    organization: LaPoste
    reference_url: "https://datanova.laposte.fr/datasets/laposte-hexasmal"
    license: "Open License"
    description: "Official French postal codes from La Poste"
    url: "https://datanova.laposte.fr/data-fair/api/v1/datasets/laposte-hexasmal/data-files/019HexaSmal.csv"
    filename: "zip_codes"
    source_file_patterns:
      - zip_codes
    file_targets:
      - zip_codes
    extensions:
      - .csv
    domain: "geography"
    target_folder: "geography"

  - name: "bpe"
    source_id: 7
    source_label: "Base permanente des équipements"
    organization: INSEE
    reference_url: "https://www.insee.fr/fr/metadonnees/source/operation/s2216/politique-diffusion"
    license: "INSEE BPE license"
    description: "Permanent database of local facilities and equipment"
    url: "https://www.insee.fr/fr/statistiques/fichier/8217527/DS_BPE_CSV_FR.zip"
    source_file_patterns:
      - "DS_BPE_2024_data.csv"
    file_targets:
      - bpe
    extensions:
      - .csv
    domain: "equipment"
    target_folder: "equipment"

scrapers:
  - name: "petites_cites"
    source_id: 13
    source_label: "Petites Cités de Caractère"
    organization: Petites Cités de Caractère
    reference_url: "https://www.petitescitesdecaractere.com/"
    license: "Public (scraped)"
    description: "Label: Petites Cités de Caractère"
    module: "flows_staging.scrapers.scrape_petites_cites"
    enabled: true
    domain: "labels"
    target_folder: "labels"
    url: "https://www.petitescitesdecaractere.com/cites-sitemap.xml"
    user_agent: "FrenchTownsBot/1.0 (contact: eric.narro.ied@gmail.com)"
    concurrency: 5

  - name: "villes_fleuries"
    source_id: 14
    source_label: "Villes et Villages Fleuris"
    organization: CNVVF
    reference_url: "https://villes-et-villages-fleuris.com/"
    license: "Public (scraped)"
    description: "Label: Villes et Villages Fleuris"
    module: "flows_staging.scrapers.scrape_villes_fleuries"
    enabled: true
    domain: "labels"
    target_folder: "labels"
    url: "https://villes-et-villages-fleuris.com/les-communes-labelisees"
    endpoint: "https://villes-et-villages-fleuris.com/pages/post/commune"
    user_agent: "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/146.0.0.0 Safari/537.36"
    page_size: 1000
    crawl_delay: 1

  - name: "plus_beaux_villages"
    source_id: 15
    source_label: "Les Plus Beaux Villages de France"
    organization: Les Plus Beaux Villages de France
    reference_url: "https://www.les-plus-beaux-villages-de-france.org/"
    license: "Public (scraped)"
    description: "Label: Les Plus Beaux Villages de France"
    module: "flows_staging.scrapers.scrape_plus_beaux_villages"
    enabled: true
    domain: "labels"
    target_folder: "labels"
    url: "https://www.les-plus-beaux-villages-de-france.org/fr/nos-villages/"
    user_agent: "FrenchTownsBot/1.0 (contact: eric.narro.ied@gmail.com)"

  - name: "villes_prudentes"
    source_id: 16
    source_label: "Ville Prudente"
    organization: Ville Prudente
    reference_url: "https://www.villeprudente.fr/"
    license: "Public (scraped)"
    description: "Label: Ville Prudente"
    module: "flows_staging.scrapers.scrape_villes_prudentes"
    enabled: true
    domain: "labels"
    target_folder: "labels"
    url: "https://www.villeprudente.fr/les-villes-labellisees/"
    user_agent: "FrenchTownsBot/1.0 (contact: eric.narro.ied@gmail.com)"

  - name: "village_etape"
    source_id: 17
    source_label: "Village Étape"
    organization: Village Étape
    reference_url: "https://village-etape.fr/"
    license: "Public (scraped)"
    description: "Label: Village Étape"
    module: "flows_staging.scrapers.scrape_village_etape"
    enabled: true
    domain: "labels"
    target_folder: "labels"
    url: "https://village-etape.fr/nos-village-etape/"
    user_agent: "FrenchTownsBot/1.0 (contact: eric.narro.ied@gmail.com)"
    concurrency: 3

  - name: "famille_plus"
    source_id: 18
    source_label: "Famille Plus"
    organization: Famille Plus
    reference_url: "https://www.familleplus.fr/"
    license: "Public (scraped)"
    description: "Label: Famille Plus"
    module: "flows_staging.scrapers.scrape_famille_plus"
    enabled: true
    domain: "labels"
    target_folder: "labels"
    url: "https://www.familleplus.fr/fr/le-label/carte"
    user_agent: "FrenchTownsBot/1.0 (contact: eric.narro.ied@gmail.com)"

custom_parsers:
  - name: "ville_sportive"
    source_id: 19
    source_label: "Ville Active et Sportive"
    organization: Ville Active et Sportive
    reference_url: "https://www.ville-active-et-sportive.com/"
    license: "Public (PDF parsed)"
    description: "Label: Ville Active et Sportive"
    module: "flows_staging.custom_parsers.parse_ville_sportive"
    enabled: true
    domain: "labels"
    target_folder: "labels"
    input_dir: "data_sources/ville_active_sportive"
    pdf_file: "2025-palmares.pdf"

sources:
  - source_id: 12
    source_name: dim_equipment
    source_label: "Équipements — code-to-name mapping"
    organization: INSEE BPE
    domain: equipment
    reference_url: "https://www.insee.fr/fr/metadonnees/source/operation/s2216/politique-diffusion"
    license: "INSEE BPE license"
    description: "Equipment type code-to-name mapping table (derived from BPE nomenclature)"

source_links:
  - model: fact_population
    sources: [1, 2, 3, 4, 5]
  - model: fact_salaries
    sources: [6]
  - model: fact_equipment
    sources: [7]
  - model: dim_communes
    sources: [8, 20]
  - model: dim_geography
    sources: [8]
  - model: dim_zip_codes
    sources: [11]
  - model: dim_equipment
    sources: [12]
  - model: bridge_communes_zip_codes
    sources: [11]
  - model: dim_labels
    sources: [13, 14, 15, 16, 17, 18, 19]
  - model: dim_neighbour_communes
    sources: [8]
