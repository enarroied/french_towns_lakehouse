name: Deploy Blog

on:
  push:
    branches: [master]
    paths:
      - 'blog/_site/**'
  workflow_dispatch:

jobs:
  deploy-blog:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./blog/_site
          destination_dir: .
          keep_files: true
