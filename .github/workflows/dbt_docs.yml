name: Deploy dbt Docs

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        working-directory: french_towns_dbt
        run: |
          uv pip install dbt-core dbt-duckdb
          uv run dbt deps

      - name: Generate dbt docs
        # No MinIO needed: dbt docs generate only compiles SQL and generates
        # the manifest, it never executes models or reads from S3.
        # The create_minio_secret() macro runs but no connection is made.
        working-directory: french_towns_dbt
        run: uv run dbt docs generate --profiles-dir .

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./french_towns_dbt/target
          destination_dir: docs
          keep_files: false
