services:
  minio:
    image: minio/minio:latest
    container_name: minio-lakehouse
    ports:
      - "19000:9000"   # API / S3 endpoint
      - "19001:9001"   # Web console (https://localhost:9001 in browser)
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      # auto-create buckets on startup:
      MINIO_DEFAULT_BUCKETS: lakehouse-raw,lakehouse-processed,backups
    volumes:
      - ./data/minio:/data
      - ./input:/input:ro   # ro: Read-only
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
