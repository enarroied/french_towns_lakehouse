name: 'french_towns_dbt'
version: '1.0.0'

profile: 'french_towns_dbt'

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  french_towns_dbt:
    +materialized: external
    +external_root: 's3://validated'

vars:
  input_dir: 's3://staging-current'
  output_dir: 's3://validated'

on-run-start:
  - "{{ create_minio_secret() }}"
