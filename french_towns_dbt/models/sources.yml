version: 2

sources:
  - name: french_towns
    schema: main
    tables:
      - name: communes_geojson
        meta:
          external_location: "ST_Read('{{ var('input_dir') }}/geography/french_towns_*.geojson')"

      - name: cog_communes
        meta:
          external_location: "read_csv_auto('{{ var('input_dir') }}/geography/v_commune_2026_*.csv')"

      - name: cog_communes_comer
        meta:
          external_location: "read_csv_auto('{{ var('input_dir') }}/geography/v_commune_comer_2026_*.csv')"

      - name: cog_departements
        meta:
          external_location: "read_csv_auto('{{ var('input_dir') }}/geography/v_departement_2026_*.csv')"

      - name: cog_arrondissements
        meta:
          external_location: "read_csv_auto('{{ var('input_dir') }}/geography/v_arrondissement_2026_*.csv')"

      - name: cog_regions
        meta:
          external_location: "read_csv_auto('{{ var('input_dir') }}/geography/v_region_2026_*.csv')"

      - name: populations_historiques
        meta:
          external_location: "read_csv_auto('{{ var('input_dir') }}/demographics/historical_population_*.csv', sample_size=-1)"

      - name: salaries
        meta:
          external_location: "read_csv_auto('{{ var('input_dir') }}/demographics/historical_salaries_*.csv', sample_size=-1)"

      - name: births
        meta:
          external_location: "read_csv_auto('{{ var('input_dir') }}/demographics/births_*.csv', sample_size=-1)"

      - name: deaths
        meta:
          external_location: "read_csv_auto('{{ var('input_dir') }}/demographics/deaths_*.csv', sample_size=-1)"

      - name: family
        meta:
          external_location: "read_csv_auto('{{ var('input_dir') }}/demographics/family_*.csv', sample_size=-1)"

      - name: migration
        meta:
          external_location: "read_csv_auto('{{ var('input_dir') }}/demographics/migration_*.csv', sample_size=-1)"

      - name: zip_codes
        meta:
          external_location: "read_csv_auto('{{ var('input_dir') }}/geography/zip_codes_*.csv', sample_size=-1, encoding='latin-1', delim=';')"

      - name: bpe
        meta:
          external_location: "read_csv_auto('{{ var('input_dir') }}/equipment/bpe_*.csv', sample_size=-1, delim=';')"

      - name: dim_equipment
        meta:
          external_location: "read_csv_auto('{{ var('input_dir') }}/dim_equipment/dim_equipment_*.csv')"

      - name: french_holidays
        meta:
          external_location: "read_csv_auto('{{ var('input_dir') }}/dim_calendar/french_holidays_*.csv')"

      - name: market_holidays
        meta:
          external_location: "read_csv_auto('{{ var('input_dir') }}/dim_calendar/market_holidays_*.csv')"

      - name: religious_holidays
        meta:
          external_location: "read_csv_auto('{{ var('input_dir') }}/dim_calendar/religious_holidays_*.csv')"

      - name: french_presidents
        meta:
          external_location: "read_csv_auto('{{ var('input_dir') }}/dim_calendar/french_presidents_*.csv')"

      - name: french_prime_ministers
        meta:
          external_location: "read_csv_auto('{{ var('input_dir') }}/dim_calendar/french_prime_ministers_*.csv')"

      - name: french_legislatures
        meta:
          external_location: "read_csv_auto('{{ var('input_dir') }}/dim_calendar/french_legislatures_*.csv')"

      - name: lunar_phases
        meta:
          external_location: "read_csv_auto('{{ var('input_dir') }}/dim_calendar/lunar_phases_*.csv')"

      - name: sources
        meta:
          external_location: "read_csv_auto('{{ var('input_dir') }}/dim_source/sources_*.csv')"

      - name: bridge_model_sources
        meta:
          external_location: "read_csv_auto('{{ var('input_dir') }}/dim_source/bridge_model_sources_*.csv')"

      - name: unemployment
        meta:
          external_location: "read_csv_auto('{{ var('input_dir') }}/demographics/unemployment_*.csv', sample_size=-1)"
