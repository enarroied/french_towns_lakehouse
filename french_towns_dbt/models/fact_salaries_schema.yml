version: 2

models:
  - name: fact_salaries
    description: "Mean salaries by sex per French commune by year"

    # Model-level tests
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: ['id', 'year']
            severity: error

    columns:
      - name: id
        description: "INSEE commune code (5-character identifier)"
        data_type: CHAR(5)
        tests:
          - not_null:
              arguments:
                severity: warn
          - relationships:
              arguments:
                to: ref('dim_communes_france')
                field: id
                severity: error

      - name: year
        description: "Year of salary data"
        data_type: INTEGER
        tests:
          - not_null:
              arguments:
                severity: error
          - accepted_values:
              arguments:
                values: [2023]
                severity: warn

      - name: mean_salary_men
        description: "Mean annual salary for men"
        data_type: INTEGER
        tests:
          - not_null:
              arguments:
                severity: warn
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 200000
                severity: warn

      - name: mean_salary_women
        description: "Mean annual salary for women"
        data_type: INTEGER
        tests:
          - not_null:
              arguments:
                severity: warn
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 200000
                severity: warn

      - name: mean_salary
        description: "Mean annual salary for all sexes combined"
        data_type: INTEGER
        tests:
          - not_null:
              arguments:
                severity: warn
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 200000
                severity: warn
