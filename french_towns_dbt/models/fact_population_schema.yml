version: 2

models:
  - name: fact_population
    description: "Historical population counts per French commune by year with year-over-year evolution metrics"

    # Model-level tests
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: ['id', 'year']
            severity: error

    columns:
      - name: id
        description: "INSEE commune code (5-character identifier)"
        data_type: CHAR(5)
        tests:
          - not_null:
              arguments:
                severity: error
          - relationships:
              arguments:
                to: ref('dim_communes_france')
                field: id
                severity: error

      - name: year
        description: "Census year"
        data_type: INTEGER
        tests:
          - not_null:
              arguments:
                severity: error

      - name: population
        description: "Total population count"
        data_type: INTEGER
        tests:
          - not_null:
              arguments:
                severity: error
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 3000000
                severity: error

      - name: year_evolution
        description: "Absolute population change compared to previous year (current year - previous year). NULL for the first available year of each commune."
        data_type: INTEGER
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: -3000000
                max_value: 3000000
                severity: warn

      - name: year_evolution_percent
        description: "Relative population change compared to previous year, expressed as percentage. NULL for the first available year of each commune or when previous year population is zero."
        data_type: FLOAT
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: -100
                max_value: 1000
                severity: warn
