version: 2

models:
  - name: fact_equipment
    description: "Equipment counts per French commune per year by equipment type — sourced from INSEE BPE (Base Permanente des Équipements)"

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: ['commune_id', 'year', 'equipment_type_id']
            severity: error

    columns:
      - name: commune_id
        description: "INSEE commune code (FK to dim_communes)"
        data_type: CHAR(5)
        tests:
          - not_null:
              arguments:
                severity: error
          - relationships:
              arguments:
                to: ref('dim_communes')
                field: id
                severity: error

      - name: year
        description: "Reference year"
        data_type: INTEGER
        tests:
          - not_null:
              arguments:
                severity: error

      - name: equipment_type_id
        description: "FK to dim_equipment"
        data_type: INTEGER
        tests:
          - not_null:
              arguments:
                severity: error
          - relationships:
              arguments:
                to: ref('dim_equipment')
                field: equipment_type_id
                severity: error

      - name: source_id
        description: "FK to dim_source (1 = BPE / INSEE)"
        data_type: INTEGER
        tests:
          - not_null:
              arguments:
                severity: error
          - relationships:
              arguments:
                to: ref('dim_source')
                field: source_id
                severity: error

      - name: count
        description: "Number of equipment of this type in the commune for this year"
        data_type: INTEGER
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 500000
                severity: warn
