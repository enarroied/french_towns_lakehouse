version: 2

models:
  - name: dim_communes
    description: "Administrative dimension of all French communes including COM territories — built from INSEE COG"
    columns:
      - name: id
        description: "INSEE commune code (5-character identifier)"
        data_type: CHAR(5)
        tests:
          - unique:
              arguments:
                severity: error
          - not_null:
              arguments:
                severity: error

      - name: name
        description: "Official commune name"
        data_type: VARCHAR(255)
        tests:
          - not_null:
              arguments:
                severity: error

      - name: name_upper
        description: "Commune name in UPPERCASE"
        data_type: VARCHAR(255)

      - name: arrondissement_code
        description: "INSEE arrondissement code (NULL for COM territories)"
        data_type: VARCHAR(4)

      - name: arrondissement_name
        description: "Name of the arrondissement (NULL for COM territories)"
        data_type: VARCHAR(255)

      - name: department_code
        description: "INSEE department code (2A, 2B, 01–95, 971–976, or COMER code for COM)"
        data_type: VARCHAR(3)
        tests:
          - not_null:
              arguments:
                severity: error

      - name: department_name
        description: "Name of the department or COM territory"
        data_type: VARCHAR(255)
        tests:
          - not_null:
              arguments:
                severity: error

      - name: region_code
        description: "INSEE region code (numeric, or COMER code for COM)"
        data_type: VARCHAR(2)

      - name: region_name
        description: "Name of the region or COM territory"
        data_type: VARCHAR(255)

      - name: territory_type
        description: "Classification: 'METROPOLE_DROM' for mainland + overseas departments, 'COM' for overseas collectivities"
        data_type: VARCHAR(14)
        tests:
          - accepted_values:
              arguments:
                values: ["METROPOLE_DROM", "COM"]
                severity: error

      - name: flag_corsica
        description: "1 if commune is in Corsica (department 2A or 2B), 0 otherwise"
        data_type: INTEGER
        tests:
          - accepted_values:
              arguments:
                values: [0, 1]
                severity: error

      - name: flag_metropole
        description: "1 if commune is in metropolitan France (not overseas), 0 otherwise"
        data_type: INTEGER
        tests:
          - accepted_values:
              arguments:
                values: [0, 1]
                severity: error

      - name: flag_prefecture
        description: "1 if commune is a department prefecture (capital), 0 otherwise (always 0 for COM)"
        data_type: INTEGER
        tests:
          - accepted_values:
              arguments:
                values: [0, 1]
                severity: error

      - name: flag_chef_lieu_arrondissement
        description: "1 if commune is an arrondissement capital, 0 otherwise (always 0 for COM)"
        data_type: INTEGER
        tests:
          - accepted_values:
              arguments:
                values: [0, 1]
                severity: error

      - name: flag_sous_prefecture
        description: "1 if commune is a sous-prefecture (arrondissement capital but not department prefecture), 0 otherwise"
        data_type: INTEGER
        tests:
          - accepted_values:
              arguments:
                values: [0, 1]
                severity: error
